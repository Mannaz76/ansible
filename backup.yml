- name : backup-server
  hosts: server
  become: yes
  tasks:
    - name: Обновление кэша apt
      apt:
        update_cache: yes

    - name: Установка borgbackup
      apt:
        name: borgbackup
        state: latest

    - name: Убедиться, что пользователь существует
      ansible.builtin.user:
        name: borg
        comment: "New User"
        shell: /bin/bash
        append: yes
        state: present
        password: "{{ 'password1' | password_hash('sha512') }}"

    - name: add gpt in /dev/sdd
      parted:
        device: /dev/sdd
        number: 1
        state: present
        part_type: primary
        part_start: 0%
        part_end: 100%
        label: gpt
    

    - name: create ext4 in sdd
      filesystem:
        fstype: ext4
        dev: /dev/sdd1
          
    - name: create point mount
      file:
        path: /var/backup
        state: directory
        owner: borg
        group: borg
        mode: '0755'

    - name: create ssh dir
      file:
        path: /home/borg/.ssh
        state: directory
        owner: borg
        group: borg
        mode: '0700'

    - name: Touch a file authorized_kays
      ansible.builtin.file:
        path: /home/borg/.ssh/authorized_keys
        state: touch
        owner: borg
        group: borg
        mode: '0600'

    - name: mount
      mount:
        path: /var/backup
        src: /dev/sdd1
        fstype: ext4
        state: mounted


- name : backup-client
  hosts: client
  become: yes
  tasks:
    - name: Обновление кэша apt
      apt:
        update_cache: yes

    - name: Установка borgbackup
      apt:
        name: borgbackup
        state: latest

    - name: Create user and generate SSH key
      ansible.builtin.user:
        name: borg
        shell: /bin/bash
        append: yes
        state: present
        password: "{{ 'password1' | password_hash('sha512') }}"
        generate_ssh_key: yes
        ssh_key_bits: 4096
        ssh_key_type: rsa  # Or 'ed25519' for modern security
        ssh_key_file: .ssh/id_rsa

    - name: Инициализация Borg репозитория
      ansible.builtin.command:
        cmd: "borg init --encryption=repokey borg@192.168.87.135:/var/backup/"

    - name: создаем backup
      ansible.builtin.command:
        cmd: 'borg create --stats --list borg@192.168.11.160:/var/backup/::"etc-{now:%Y-%m-%d_%H:%M:%S}" /etc'

    - name: Создать service barg-backup.service
      ansible.builtin.copy:
        dest: /etc/systemd/system/borg-backup.service
        content: |
          [Unit]
          Description=Borg Backup

          [Service]
          Type=oneshot

          # Парольная фраза
          Environment="BORG_PASSPHRASE=password1"
          # Репозитори
          Environment=REPO=borg@192.168.87.135:/var/backup/
          # Что бэкапим
          Environment=BACKUP_TARGET=/etc

          # Создание бэкапа
          ExecStart=/bin/borg create \
              --stats                \
              ${REPO}::etc-{now:%%Y-%%m-%%d_%%H:%%M:%%S} ${BACKUP_TARGET}

          # Проверка бэкапа
          ExecStart=/bin/borg check ${REPO}

          # Очистка старых бэкапов
          ExecStart=/bin/borg prune \
              --keep-daily  90      \
              --keep-monthly 12     \
              --keep-yearly  1       \
              ${REPO}
        mode: '0744'
  
    - name: Создать service borg-backup.timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/borg-backup.timer
        content: |
          [Unit]
          Description=Borg Backup

          [Timer]
          OnUnitActiveSec=5min

          [Install]
          WantedBy=timers.target

        mode: '0744'

    - name: Enable and start the borg-backup.timer service
      ansible.builtin.service:
        name: borg-backup.timer
        enabled: true
        state: started

